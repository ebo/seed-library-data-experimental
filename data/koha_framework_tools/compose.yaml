services:
  www:
    build:
      dockerfile: ./dockerfile.www
    volumes:
      - "./koha_framework_tools:/app/koha_framework_tools"
      - "./db:/app/db"
      - "./docker/www/prestart.sh:/app/prestart.sh"
    ports:
      - "80:80"
    environment:
      IS_DEV: true
      RELOAD: true
      DATABASE_URL: postgresql://main:main12345@db/main
      CELERY_BROKER: redis://redis:6379/0
    depends_on:
      - db
      - redis

  celery-scheduler:
    build:
      dockerfile: ./dockerfile.celery
    volumes:
      - "./koha_framework_tools:/app/koha_framework_tools"
      - "./db:/app/db"
      - "./docker/celery/prestart.sh:/app/prestart.sh"
    environment:
      IS_DEV: true
      DATABASE_URL: postgresql://main:main12345@db/main
      CELERY_BROKER: redis://redis:6379/0
    depends_on:
      - db
      - redis

  celery-node:
    build:
      dockerfile: ./dockerfile.celery
    volumes:
      - "./koha_framework_tools:/app/koha_framework_tools"
      - "./db:/app/db"
      - "./docker/celery/prestart.sh:/app/prestart.sh"
    environment:
      IS_DEV: true
      DATABASE_URL: postgresql://main:main12345@db/main
      CELERY_BROKER: redis://redis:6379/0
    depends_on:
      - db
      - redis

  qq:
    build:
      dockerfile: ./dockerfile.qq
    volumes:
      - "./koha_framework_tools:/app/koha_framework_tools"
    environment:
      IS_DEV: true
      DATABASE_URL: postgresql://main:main12345@db/main
      CELERY_BROKER: redis://redis:6379/0
    depends_on:
      - db
      - redis

  redis:
    image: redis

  db:
    image: postgres
    restart: always
    environment:
      POSTGRES_PASSWORD: main12345
      POSTGRES_USER: main
      POSTGRES_DB: main
